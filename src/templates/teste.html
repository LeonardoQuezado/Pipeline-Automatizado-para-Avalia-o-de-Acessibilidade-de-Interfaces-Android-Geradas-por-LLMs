<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Código — Accessibility Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg:     #13131f;
      --sidebar-border: #24243a;
      --accent:         #4ade80;
      --accent-hover:   #22c55e;
      --btn-disabled:   #2d3748;
      --terminal-bg:    #0d1117;
      --terminal-text:  #cdd9e5;
      --label:          #7d8fa3;
      --input-bg:       #0f172a;
      --input-border:   #2a3a4e;
      --header-bg:      #161b22;
      --header-border:  #21262d;
      --panel-bg:       #0f1621;
      --panel-border:   #1e2a3a;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--terminal-bg); color: var(--terminal-text); }
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    aside {
      width: 320px; min-width: 320px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex; flex-direction: column;
      padding: 20px 18px 18px; gap: 16px;
      overflow-y: auto;
    }
    .logo { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; line-height: 1.4; }
    .logo .accent { color: var(--accent); }

    .back-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: var(--label); text-decoration: none;
      padding: 5px 0; transition: color 0.15s;
    }
    .back-link:hover { color: #c9d1d9; }

    .section-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--label); margin-bottom: 6px; }

    .info-box {
      background: #0a1220; border: 1px solid #1a2a40; border-radius: 8px;
      padding: 10px 12px; font-size: 0.72rem; color: var(--label); line-height: 1.55;
    }
    .info-box strong { color: #c9d1d9; }

    .code-area-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; gap: 8px; }
    label { font-size: 0.72rem; color: var(--label); }
    textarea {
      width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
      color: #c9d1d9; border-radius: 8px; padding: 10px 12px; font-size: 0.75rem;
      outline: none; transition: border-color 0.15s; resize: none;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      line-height: 1.55; flex: 1; min-height: 0;
    }
    textarea:focus { border-color: var(--accent); }

    .char-count { font-size: 0.65rem; color: #3d4f66; text-align: right; }

    .run-btn {
      padding: 11px; background: var(--accent); color: #0a0f0a;
      font-weight: 700; font-size: 0.87rem; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .run-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .run-btn:disabled { background: var(--btn-disabled); color: #4b5563; cursor: not-allowed; }

    .clear-code-btn {
      background: none; border: 1px solid var(--input-border); color: var(--label);
      border-radius: 6px; padding: 6px 12px; font-size: 0.72rem; cursor: pointer;
      transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .clear-code-btn:hover { color: #f87171; border-color: #f87171; }

    .btn-row { display: flex; gap: 8px; }

    /* ── Main area ── */
    main { flex: 1; display: flex; flex-direction: row; overflow: hidden; min-width: 0; }
    .terminal-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .output-header {
      display: flex; align-items: center; gap: 10px; padding: 9px 16px;
      background: var(--header-bg); border-bottom: 1px solid var(--header-border);
      font-size: 0.78rem; flex-shrink: 0;
    }
    .output-header .title { flex: 1; color: var(--label); }
    .status-badge { padding: 2px 9px; border-radius: 99px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .s-idle    { background: #1c2333; color: #4b5563; }
    .s-running { background: #0d2a1f; color: var(--accent); }
    .s-done    { background: #0a2016; color: #34d399; }
    .s-error   { background: #2a0f12; color: #f87171; }

    .clear-btn { background: none; border: 1px solid #21262d; color: #4b5563; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.72rem; transition: color 0.15s, border-color 0.15s; }
    .clear-btn:hover { color: #c9d1d9; border-color: #3d444d; }

    #output { flex: 1; overflow-y: auto; padding: 14px 18px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.78rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .ln { display: block; }
    .ln-empty  { min-height: 0.9em; }
    .ln-sep    { color: #3d4f66; }
    .ln-ok     { color: #4ade80; }
    .ln-err    { color: #f87171; }
    .ln-warn   { color: #fbbf24; }
    .ln-info   { color: #60a5fa; }
    .ln-normal { color: var(--terminal-text); }
    .cursor { display: inline-block; width: 0.45em; height: 1.1em; background: var(--accent); animation: blink 1s step-end infinite; vertical-align: text-bottom; border-radius: 1px; }
    @keyframes blink { 50% { opacity: 0; } }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

    /* ── Report Panel ── */
    .report-panel {
      width: 0; overflow: hidden;
      border-left: 1px solid var(--panel-border);
      background: var(--panel-bg);
      display: flex; flex-direction: column;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .report-panel.open { width: 400px; }
    .rp-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--header-bg); border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
    .rp-title { font-size: 0.78rem; font-weight: 600; color: #c9d1d9; flex: 1; }
    .rp-close { background: none; border: none; color: #4b5563; cursor: pointer; font-size: 0.9rem; padding: 2px 6px; border-radius: 3px; transition: color 0.15s; }
    .rp-close:hover { color: #c9d1d9; }
    .rp-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
    .rp-body::-webkit-scrollbar { width: 4px; }
    .rp-body::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }

    /* LLM cards */
    .llm-card { background: #0d1521; border: 1px solid var(--panel-border); border-radius: 8px; overflow: hidden; }
    .llm-card-header { display: flex; align-items: center; padding: 11px 14px; gap: 10px; border-bottom: 1px solid var(--panel-border); }
    .llm-card-name { font-size: 0.8rem; font-weight: 700; color: #e2e8f0; flex: 1; letter-spacing: 0.04em; }
    .card-status { font-size: 0.65rem; font-weight: 700; padding: 3px 9px; border-radius: 99px; letter-spacing: 0.03em; }
    .cs-success { background: #0a2016; color: #4ade80; }
    .cs-failed  { background: #2a0f12; color: #f87171; }
    .cs-genfail { background: #2a1a00; color: #fb923c; }

    .llm-card-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .issue-row { display: flex; align-items: baseline; gap: 6px; font-size: 0.73rem; }
    .issue-source { font-size: 0.62rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.05em; flex-shrink: 0; }
    .src-lint { background: #1a1a4a; color: #818cf8; }
    .src-atf  { background: #0a2a1a; color: #4ade80; }
    .src-static { background: #1a2a1a; color: #a3e635; }
    .issue-count { font-weight: 700; color: #e2e8f0; flex-shrink: 0; min-width: 16px; }
    .issue-count.zero { color: #374151; }
    .issue-tags { color: var(--label); font-size: 0.68rem; line-height: 1.4; }
    .issue-tags .tag { display: inline-block; background: #1a2a1a; color: #6ee7b7; padding: 1px 5px; border-radius: 3px; margin: 1px 2px 1px 0; font-size: 0.63rem; }
    .issue-tags .tag.warn { background: #2a2000; color: #fbbf24; }
    .issue-tags .tag.err  { background: #2a0f12; color: #f87171; }
    .error-msg { font-size: 0.68rem; color: #f87171; background: #1a0a0a; border-radius: 4px; padding: 6px 8px; font-family: monospace; line-height: 1.4; word-break: break-all; }

    /* Code viewer */
    .code-section { border-top: 1px solid var(--panel-border); margin-top: 4px; }
    .code-toggle { list-style: none; cursor: pointer; padding: 7px 12px; font-size: 0.7rem; color: var(--label); display: flex; align-items: center; gap: 5px; user-select: none; transition: color 0.15s; }
    .code-toggle:hover { color: #c9d1d9; }
    .code-toggle::before { content: '▶'; font-size: 0.55rem; transition: transform 0.2s; }
    details[open] > .code-toggle::before { transform: rotate(90deg); }
    .code-wrapper { position: relative; padding: 0 12px 10px; }
    .code-pre { background: #060d16; border: 1px solid #1a2535; border-radius: 5px; padding: 10px; overflow: auto; max-height: 300px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.62rem; line-height: 1.5; color: #b0c4d8; white-space: pre; tab-size: 4; }
    .copy-btn { position: absolute; top: 6px; right: 18px; z-index: 1; background: #1a2535; border: 1px solid #2a3a50; border-radius: 4px; color: var(--label); font-size: 0.62rem; padding: 2px 8px; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .copy-btn:hover { background: #243045; color: #c9d1d9; }

    /* Timing bar */
    .timing-section { margin-top: 2px; }
    .timing-bar { height: 6px; border-radius: 3px; overflow: hidden; display: flex; background: #0a0f1a; }
    .tb-gen   { background: #3b82f6; }
    .tb-build { background: #f59e0b; }
    .tb-lint  { background: #8b5cf6; }
    .tb-atf   { background: #10b981; }
    .timing-labels { display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap; }
    .tl-item { font-size: 0.62rem; color: var(--label); display: flex; align-items: center; gap: 3px; }
    .tl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tl-build { background: #f59e0b; }
    .tl-lint  { background: #8b5cf6; }
    .tl-atf   { background: #10b981; }
    .validation-wrap { margin-bottom: 10px; }
    .validation-wrap label { display: block; font-size: 0.72rem; color: var(--label); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
    .validation-wrap select { width: 100%; background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; font-size: 0.78rem; cursor: pointer; }
    .validation-wrap select:focus { outline: none; border-color: var(--accent); }
    .expected-badge { display: none; margin-top: 5px; padding: 5px 8px; border-radius: 4px; background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); font-size: 0.72rem; color: var(--accent); }
    .expected-badge.visible { display: block; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside>
    <div>
      <div class="logo">♿ <span class="accent">Accessibility</span><br>LLM Pipeline</div>
      <a class="back-link" href="/">← Voltar ao Pipeline completo</a>
    </div>

    <div class="info-box">
      <strong>Modo Teste</strong><br>
      Cole qualquer código Kotlin aqui para buildá-lo como APK e analisá-lo com <strong>Lint</strong> e <strong>ATF</strong> — sem chamar nenhuma LLM.
    </div>

    <div class="validation-wrap">
      <label>Telas de validação</label>
      <select id="validationSelect">
        <option value="">— Código manual —</option>
      </select>
      <div class="expected-badge" id="expectedBadge"></div>
    </div>

    <div class="code-area-wrap">
      <label for="codeInput">Código Kotlin</label>
      <textarea id="codeInput" spellcheck="false"
        placeholder="package com.accessibility.test

import androidx.compose.runtime.Composable
...

@Composable
fun MainScreen() {
    // cole seu código aqui
}"></textarea>
      <span class="char-count" id="charCount">0 linhas</span>

      <div class="btn-row">
        <button class="clear-code-btn" id="clearCodeBtn" type="button">Limpar</button>
        <button class="run-btn" id="runBtn" style="flex:1">▶ Buildar &amp; Analisar</button>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main>
    <div class="terminal-section">
      <div class="output-header">
        <span class="title">Build Output</span>
        <span class="status-badge s-idle" id="statusBadge">idle</span>
        <button class="clear-btn" id="clearBtn">Limpar</button>
      </div>
      <div id="output"></div>
    </div>

    <!-- Report Panel -->
    <div class="report-panel" id="reportPanel">
      <div class="rp-header">
        <span class="rp-title">Resultado</span>
        <button class="rp-close" id="rpClose" title="Fechar">✕</button>
      </div>
      <div class="rp-body" id="rpBody"></div>
    </div>
  </main>
</div>

<script>
  const outputEl        = document.getElementById('output');
  const runBtn          = document.getElementById('runBtn');
  const clearBtn        = document.getElementById('clearBtn');
  const clearCodeBtn    = document.getElementById('clearCodeBtn');
  const statusBadge     = document.getElementById('statusBadge');
  const codeInput       = document.getElementById('codeInput');
  const charCount       = document.getElementById('charCount');
  const reportPanel     = document.getElementById('reportPanel');
  const rpBody          = document.getElementById('rpBody');
  const rpClose         = document.getElementById('rpClose');
  const validationSelect = document.getElementById('validationSelect');
  const expectedBadge   = document.getElementById('expectedBadge');

  // ── Validation screen loader ───────────────────────────────
  const _screenData = {};

  async function loadValidationScreens() {
    try {
      const res = await fetch('/api/validation-screens');
      const data = await res.json();
      data.screens.forEach(s => {
        _screenData[s.id] = { code: s.code, expected: s.expected };
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        validationSelect.appendChild(opt);
      });
    } catch (e) { /* servidor pode não ter o endpoint ainda */ }
  }

  validationSelect.addEventListener('change', () => {
    const id = validationSelect.value;
    if (id && _screenData[id]) {
      codeInput.value = _screenData[id].code;
      const lines = codeInput.value.split('\n').length;
      charCount.textContent = `${lines} linha${lines !== 1 ? 's' : ''}`;
      expectedBadge.textContent = `Esperado: ${_screenData[id].expected}`;
      expectedBadge.classList.add('visible');
    } else {
      expectedBadge.classList.remove('visible');
    }
  });

  loadValidationScreens();

  let cursorEl   = null;
  let autoScroll = true;

  // ── Char counter ───────────────────────────────────────
  codeInput.addEventListener('input', () => {
    const lines = codeInput.value.split('\n').length;
    charCount.textContent = `${lines} linha${lines !== 1 ? 's' : ''}`;
  });

  clearCodeBtn.addEventListener('click', () => {
    codeInput.value = '';
    charCount.textContent = '0 linhas';
  });

  // ── Auto-scroll ────────────────────────────────────────
  outputEl.addEventListener('scroll', () => {
    autoScroll = outputEl.scrollHeight - outputEl.scrollTop <= outputEl.clientHeight + 50;
  });
  function scrollBottom() { if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight; }

  // ── Status badge ───────────────────────────────────────
  function setStatus(state) {
    const map = { idle: ['s-idle','idle'], running: ['s-running','running…'], done: ['s-done','concluído'], error: ['s-error','erro'] };
    const [cls, label] = map[state] || ['s-idle', state];
    statusBadge.className = 'status-badge ' + cls;
    statusBadge.textContent = label;
  }

  // ── Cursor ─────────────────────────────────────────────
  function showCursor() {
    if (cursorEl) return;
    cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    outputEl.appendChild(cursorEl);
    scrollBottom();
  }
  function removeCursor() { if (cursorEl) { cursorEl.remove(); cursorEl = null; } }

  // ── Line classifier ────────────────────────────────────
  function lineClass(text) {
    if (!text.trim()) return 'ln-empty';
    if (/^[=\-─]+$/.test(text.trim()) || text.includes('====') || text.includes('────')) return 'ln-sep';
    if (/APK built|Pipeline complete|extracted|\[OK\]/.test(text)) return 'ln-ok';
    if (/\[FAIL\]|Build failed|FAILED|Error:|error:|Fatal/.test(text)) return 'ln-err';
    if (/\[WARN\]|Warning|HardcodedText|ContentDescription/.test(text)) return 'ln-warn';
    if (/\[STATIC\]/.test(text)) return 'ln-info';
    return 'ln-normal';
  }
  function appendLine(text) {
    removeCursor();
    const span = document.createElement('span');
    span.className = 'ln ' + lineClass(text);
    span.textContent = text === '' ? ' ' : text;
    outputEl.appendChild(span);
    scrollBottom();
  }

  // ── Report helpers ─────────────────────────────────────
  function fmt(s) { return s != null ? s.toFixed(1) + 's' : '-'; }

  function buildTimingBar(t) {
    const total = (t.build_s||0) + (t.lint_s||0) + (t.atf_s||0);
    if (total === 0) return '';
    const pct = v => Math.round((v / total) * 100);
    const phases = [
      { cls: 'tb-build', v: t.build_s, label: 'tl-build', name: `build ${fmt(t.build_s)}` },
      { cls: 'tb-lint',  v: t.lint_s,  label: 'tl-lint',  name: `lint ${fmt(t.lint_s)}`   },
      { cls: 'tb-atf',   v: t.atf_s,   label: 'tl-atf',   name: `ATF ${fmt(t.atf_s)}`     },
    ].filter(p => p.v > 0);
    const bars   = phases.map(p => `<div class="${p.cls}" style="width:${pct(p.v)}%"></div>`).join('');
    const labels = phases.map(p => `<span class="tl-item"><span class="tl-dot ${p.label}"></span>${p.name}</span>`).join('');
    return `<div class="timing-section"><div class="timing-bar">${bars}</div><div class="timing-labels">${labels}</div></div>`;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function copyCode(btn) {
    const pre = btn.nextElementSibling;
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = 'Copiado!';
      setTimeout(() => { btn.textContent = 'Copiar'; }, 1500);
    });
  }

  function buildIssueTag(check, count) {
    const cls = (check === 'HardcodedText' || check === 'Autofill') ? 'warn' : 'err';
    return `<span class="tag ${cls}">${check} ×${count}</span>`;
  }

  function buildResultCard(r) {
    const statusCls   = r.status === 'success' ? 'cs-success' : 'cs-failed';
    const statusLabel = r.status === 'success' ? '✓ success' : '✗ ' + r.status.replace('_', ' ');

    let body = '';
    if (r.status !== 'success') {
      const msg = (r.error || '').split('\n')[0].slice(0, 200);
      body = `<div class="error-msg">${escapeHtml(msg || r.status)}</div>`;
    } else {
      const lintTotal = r.accessibility_issues?.total || 0;
      const lintCats  = r.accessibility_issues?.by_category || {};
      const lintTags  = Object.entries(lintCats).map(([c,n]) => buildIssueTag(c,n)).join('');

      const staticTotal = r.static_issues?.total || 0;
      const staticTags  = (r.static_issues?.issues || []).slice(0,5)
        .map(i => `<span class="tag err">${escapeHtml(i.id)}</span>`).join('');

      const atfTotal  = r.atf_issues?.total || 0;
      const atfChecks = {};
      (r.atf_issues?.issues || []).forEach(i => { atfChecks[i.check] = (atfChecks[i.check]||0)+1; });
      const atfTags = Object.entries(atfChecks)
        .map(([c,n]) => `<span class="tag">${escapeHtml(c)} ×${n}</span>`).join('');

      body = `
        <div class="issue-row">
          <span class="issue-source src-static">STATIC</span>
          <span class="issue-count ${staticTotal===0?'zero':''}">${staticTotal}</span>
          <span class="issue-tags">${staticTags || '<span style="color:#374151;font-size:0.65rem">nenhum</span>'}</span>
        </div>
        <div class="issue-row">
          <span class="issue-source src-lint">LINT</span>
          <span class="issue-count ${lintTotal===0?'zero':''}">${lintTotal}</span>
          <span class="issue-tags">${lintTags || '<span style="color:#374151;font-size:0.65rem">nenhum</span>'}</span>
        </div>
        <div class="issue-row">
          <span class="issue-source src-atf">ATF</span>
          <span class="issue-count ${atfTotal===0?'zero':''}">${atfTotal}</span>
          <span class="issue-tags">${atfTags || '<span style="color:#374151;font-size:0.65rem">nenhum</span>'}</span>
        </div>
        ${buildTimingBar(r.timing)}`;
    }

    const codeHtml = r.generated_code
      ? `<details class="code-section">
          <summary class="code-toggle">Ver código final compilado (${r.generated_code.split('\n').length} linhas)</summary>
          <div class="code-wrapper">
            <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
            <pre class="code-pre">${escapeHtml(r.generated_code)}</pre>
          </div>
        </details>` : '';

    return `<div class="llm-card">
      <div class="llm-card-header">
        <span class="llm-card-name">RESULTADO</span>
        <span class="card-status ${statusCls}">${statusLabel}</span>
      </div>
      <div class="llm-card-body">${body}</div>
      ${codeHtml}
    </div>`;
  }

  async function showReport() {
    try {
      const data = await fetch('/api/report/latest').then(r => r.json());
      const testResult = data.llms?.test;
      if (!testResult) return;
      rpBody.innerHTML = buildResultCard(testResult);
      reportPanel.classList.add('open');
    } catch(e) { console.error('Report fetch failed', e); }
  }

  rpClose.addEventListener('click', () => reportPanel.classList.remove('open'));

  // ── Run ────────────────────────────────────────────────
  runBtn.addEventListener('click', async () => {
    const code = codeInput.value.trim();
    if (!code) { alert('Cole o código Kotlin antes de executar.'); return; }

    runBtn.disabled = true;
    runBtn.textContent = '⏳ Executando…';
    setStatus('running');
    autoScroll = true;
    showCursor();

    try {
      const res = await fetch('/api/test-run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kotlin_code: code }),
      });

      if (res.status === 409) { removeCursor(); alert('O pipeline já está em execução.'); setStatus('idle'); return; }
      if (!res.ok) { removeCursor(); appendLine(`[Erro HTTP ${res.status}]`); setStatus('error'); return; }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', finished = false;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n\n')) !== -1) {
          const chunk = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (chunk.startsWith('data: ')) {
            const text = chunk.slice(6);
            if (text === '__DONE__') {
              removeCursor(); setStatus('done'); finished = true;
              showReport();
            } else {
              appendLine(text); showCursor();
            }
          }
        }
      }
      if (!finished) { removeCursor(); setStatus('done'); showReport(); }

    } catch (err) {
      removeCursor(); appendLine(`[Erro de conexão: ${err.message}]`); setStatus('error');
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = '▶ Buildar & Analisar';
    }
  });

  // ── Clear terminal ─────────────────────────────────────
  clearBtn.addEventListener('click', () => {
    outputEl.innerHTML = '';
    cursorEl = null;
    setStatus('idle');
    reportPanel.classList.remove('open');
  });
</script>
</body>
</html>
